name: EAS Build — AZA Android APK

on:
  push:
    branches:
      - claude/aza-audio-playback-eas-lsyo27
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app branch
        uses: actions/checkout@v4
        with:
          ref: claude/aza-audio-playback-eas-lsyo27

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Create EAS project
        run: eas init --non-interactive --force
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          echo "Building with profile: $PROFILE"
          eas build --platform android --profile "$PROFILE" --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Done
        run: echo "✅ Build queued! Check https://expo.dev/accounts/azasou86/projects"
