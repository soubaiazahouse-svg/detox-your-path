name: EAS Build — AZA Android APK

on:
  push:
    branches:
      - claude/aza-audio-playback-eas-lsyo27
      - main
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile (preview = APK, production = APK)'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: claude/aza-audio-playback-eas-lsyo27

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          echo "Building with profile: $PROFILE"
          eas build --platform android --profile "$PROFILE" --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
