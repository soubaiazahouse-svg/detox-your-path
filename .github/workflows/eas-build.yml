name: EAS Build — AZA Android APK

on:
  push:
    branches:
      - claude/aza-audio-playback-eas-lsyo27
      - main
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Initialize EAS project (first run only)
        run: |
          eas project:info 2>/dev/null || eas init --id aza-house-audio --force
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          echo "Building profile: $PROFILE"
          eas build --platform android --profile "$PROFILE" --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build queued
        run: |
          echo ""
          echo "✅ EAS Build queued successfully!"
          echo "📱 Check build status at: https://expo.dev/accounts/azasou86/projects/aza-house/builds"
          echo ""
